  function drawRedCircle(x, y, radius) {
    ctx.beginPath(); ctx.arc(x,y,radius,0,Math.PI*2); ctx.lineWidth = 18; ctx.strokeStyle = 'black'; ctx.stroke();
    ctx.fillStyle = 'white'; ctx.fill();
    ctx.beginPath(); ctx.arc(x,y,radius-60,0,Math.PI*2); ctx.fillStyle = 'red'; ctx.fill();
    
  }
  function drawBlueRectCircle(x,y,radius) {
   
    ctx.beginPath(); ctx.arc(x,y,radius,0,Math.PI*2); ctx.lineWidth = 18; ctx.strokeStyle = 'black'; ctx.fillStyle='white'; ctx.fill(); ctx.stroke();
    let rectWidth = radius - 10, rectHeight = 160;
    ctx.beginPath(); ctx.rect(x-rectWidth/2, y-rectHeight/2, rectWidth, rectHeight);
    ctx.fillStyle = 'blue'; ctx.strokeStyle='blue'; ctx.lineWidth = 10; ctx.fill(); ctx.stroke();
  }
  function drawYellowTriangleCircle(x,y,radius) {
    
    ctx.beginPath(); ctx.arc(x,y,radius,0,Math.PI*2); ctx.fillStyle='white'; ctx.fill();
    ctx.lineWidth = 18; ctx.strokeStyle='black'; ctx.stroke();
    ctx.beginPath();
    for (let i=0;i<3;i++){
      const angle = (i*2*Math.PI)/3 - Math.PI/2;
      const px = x + (radius-40)*Math.cos(angle);
      const py = y + (radius-40)*Math.sin(angle);
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.closePath();
    ctx.fillStyle = 'yellow'; ctx.fill();
  }

 function drawEntity(ent) {
  if (!ent || !ent.type) return;

  ctx.save(); // sauvegarde l'état du canvas

 if (ent.invisible) {
  ctx.globalAlpha = 0;       // R → invisible total
} else if (ent.inBush) {
  ctx.globalAlpha = 0.1;     // bush → transparent
} else {
  ctx.globalAlpha = 1;
}

  

  // Dessin selon le type
  if (ent.type === 'redCircle') {
    drawRedCircle(ent.x, ent.y, ent.radius);
    speedbutton.innerText = ' Press B';
    speedbutton.style.opacity = 1;
    Dashbutton.style.opacity = 0;
    Invisible.style.opacity = 0;
  } 
  else if (ent.type === 'blueRectCircle') {
    drawBlueRectCircle(ent.x, ent.y, ent.radius);
    speedbutton.style.opacity = 0;
    Dashbutton.style.opacity = 0;
    Invisible.style.opacity = 1;
  } 
  else if (ent.type === 'yellowTriangleCircle') {
    drawYellowTriangleCircle(ent.x, ent.y, ent.radius);
    speedbutton.style.opacity = 0;
    Dashbutton.style.opacity = 0;
    Invisible.style.opactity = 1;
  }
  

  ctx.restore(); // restaure l'état (IMPORTANT)
}
 
  
  function drawsafezoneyellow () {
    ctx.fillStyle = 'yellow';
    for (const s of safezoneyellow) {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size / 2, 0, Math.PI * 2);
    ctx.fill();
   ctx.globalAlpha = 0.5;
    const currentX = safezoneyellow ? s.x : worldW/2;
    const currentY = safezoneyellow ? s.y : worldH/2;
    }
  }
  function drawsafezonered () {

    ctx.fill();
   ctx.globalAlpha = 0.5;
    const currentX = safezonered ? s.x : worldW/2;
    const currentY = safezonered ? s.y : worldH/2;
    }
  }
  function drawsafezoneblue () {

  function drawBushes(){

  }
}

function restartChangeTimerWithoutConsuming() {
  // Si le change est déjà dispo → pas de timer
  if (changeAvailable > 0) {
    changeTimerDisplay.style.opacity = 0;
    return;
  }

  clearTimeout(changeTimer);
  clearInterval(countdownInterval);

  // 🔁 repart à 30
  changeCountdown = changeDuration;
  updateChangeTimerDisplay();

  // ⏱️ COMPTE À REBOURS ACTIF
  countdownInterval = setInterval(() => {
    changeCountdown--;
    updateChangeTimerDisplay();

    if (changeCountdown <= 0) {
      clearInterval(countdownInterval);
    }
  }, 1000);

  // 🎁 autorisation du change
  changeTimer = setTimeout(grantChangeIfPossible, CHANGE_INTERVAL_MS);
}
